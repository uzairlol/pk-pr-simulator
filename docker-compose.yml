services:
  db:
    image: postgres:16
    container_name: pk-pr-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pkpr
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: pk_pr_simulator
    volumes:
      - pk_pr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pkpr -d pk_pr_simulator"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pk_pr_pgdata:
